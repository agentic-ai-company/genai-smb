# .github/workflows/cd.yml
name: CD

on:
  push:
    branches: [main]               # only fires on merge to main

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false        # NEVER cancel a deploy in progress

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. yourname/fastapi-hello

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write              # needed to push to GHCR

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-provided, no setup needed

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-          # e.g. sha-a1b2c3d
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Image digest → ${{ steps.build.outputs.digest }}"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production         # ← enables manual approval gate on GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy (simulated)
        run: |
          echo "Deploying image: ${{ needs.build-and-push.outputs.image-tag }}"
          echo "Digest: ${{ needs.build-and-push.outputs.image-digest }}"
          # In a real project this step would be:
          # - SSH into a server and docker pull + restart
          # - kubectl set image ... (Kubernetes)
          # - aws ecs update-service ... (ECS)
          # - fly deploy (Fly.io)
          echo "Deploy complete ✅"
