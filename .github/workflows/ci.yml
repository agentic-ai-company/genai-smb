# .github/workflows/ci.yml
name: CI

# Triggers: run on every push and every PR targeting main
on:
  push:
    branches: ["**"]          # all branches
  pull_request:
    branches: [main]          # PRs into main specifically

# Prevent duplicate runs: cancel old run if a new push comes in
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"               # caches pip downloads between runs

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff (linter)
        run: ruff check src/ tests/

      - name: Run ruff (formatter check)
        run: ruff format --check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint                      # only runs if lint passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7          # auto-deleted after 7 days
